<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ForgeAdmin — Seed Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50:'#fff7ed',100:'#ffedd5',500:'#f97316',600:'#ea580c' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center p-6">
    <div class="bg-white border border-gray-100 shadow-xl rounded-3xl max-w-xl w-full p-8">
        <div class="flex items-center gap-4 mb-6">
            <div class="w-14 h-14 bg-gradient-to-br from-brand-500 to-orange-600 rounded-2xl flex items-center justify-center text-white text-2xl shadow-lg shadow-brand-500/30">
                <i class="fa-solid fa-database"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Seed Database</h1>
                <p class="text-gray-500 text-sm">Populate Firestore with demo data</p>
            </div>
        </div>

        <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-6 text-sm text-amber-700">
            <i class="fa-solid fa-triangle-exclamation mr-2"></i>
            <strong>Run only once.</strong> This will add demo products, categories, orders, customers, reviews, promotions, and staff to your Firestore database. Make sure you are logged in first.
        </div>

        <div id="log" class="bg-gray-900 text-green-400 font-mono text-xs rounded-xl p-4 min-h-[140px] max-h-64 overflow-y-auto mb-6 whitespace-pre-wrap">
            Ready to seed. Press the button below to begin...
        </div>

        <div class="flex gap-3">
            <button id="seedBtn" onclick="runSeed()"
                class="flex-1 py-3 bg-brand-500 text-white font-semibold rounded-xl hover:bg-brand-600 transition-colors shadow-sm shadow-brand-500/30">
                <i class="fa-solid fa-seedling mr-2"></i> Seed Database
            </button>
            <a href="pages/dashboard.html"
                class="px-5 py-3 border border-gray-200 text-gray-600 font-medium rounded-xl hover:bg-gray-50 transition-colors text-center">
                Go to Dashboard
            </a>
        </div>
        <p id="status" class="text-center text-xs text-gray-400 mt-4"></p>
    </div>

    <script type="module">
        import { auth } from './js/firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { seedDatabase } from './js/seed.js';

        const log     = document.getElementById('log');
        const seedBtn = document.getElementById('seedBtn');
        const status  = document.getElementById('status');

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                status.textContent = '⚠️ You must be logged in to seed data.';
                seedBtn.disabled = true;
                seedBtn.className += ' opacity-50 cursor-not-allowed';
            } else {
                status.textContent = `Logged in as ${user.email}`;
            }
        });

        window.runSeed = async function() {
            seedBtn.disabled = true;
            seedBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Seeding...';
            log.textContent = 'Starting seed operation...\n';

            try {
                await seedDatabase((msg) => {
                    log.textContent += msg + '\n';
                    log.scrollTop = log.scrollHeight;
                });
                status.textContent = '✅ Seed complete! You can now use the dashboard.';
                seedBtn.innerHTML = '<i class="fa-solid fa-check mr-2"></i> Done!';
                seedBtn.className = seedBtn.className.replace('bg-brand-500 hover:bg-brand-600', 'bg-emerald-500 hover:bg-emerald-600');
            } catch (err) {
                log.textContent += '\n❌ ERROR: ' + err.message;
                status.textContent = 'Seed failed. Check console for details.';
                seedBtn.disabled = false;
                seedBtn.innerHTML = '<i class="fa-solid fa-seedling mr-2"></i> Retry';
            }
        };
    </script>
</body>
</html>
